version: 0.0
os: linux

files:
  - source: publish/
    destination: /opt/taskverse/college

  - source: taskverse-college.service
    destination: /etc/systemd/system

hooks:
  BeforeInstall:
    - location: scripts/before_install_college.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install_college.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start_college.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/validate_service_college.sh
      timeout: 300
      runas: root