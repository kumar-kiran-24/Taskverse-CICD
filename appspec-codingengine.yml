version: 0.0
os: linux

files:
  - source: publish/
    destination: /opt/taskverse/codingengine

  - source: taskverse-codingengine.service
    destination: /etc/systemd/system

hooks:
  BeforeInstall:
    - location: scripts/before_install_codingengine.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install_codingengine.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start_codingengine.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/validate_service_codingengine.sh
      timeout: 300
      runas: root