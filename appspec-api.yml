version: 0.0

os: linux

files:
  - source: publish/
    destination: /opt/taskverse/api

  - source: taskverse-api.service
    destination: /etc/systemd/system

hooks:
  BeforeInstall:
    - location: scripts/before_install_api.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install_api.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start_api.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/validate_service_api.sh
      timeout: 300
      runas: root