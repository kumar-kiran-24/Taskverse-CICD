version: 0.2

env:
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "===== INSTALL PHASE ====="
      - cd Angular/Taskverse
      - echo "Installing npm dependencies..."
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo "===== BUILD PHASE ====="
      - echo "Building Angular application..."
      - npm run build -- --configuration production
      - echo "Angular build completed successfully."

  post_build:
    commands:
      - echo "===== POST BUILD PHASE ====="
      - ls -la dist
      - ls -la dist/Taskverse

artifacts:
  base-directory: Angular/Taskverse/dist/Taskverse
  files:
    - '**/*'

cache:
  paths:
    - Angular/Taskverse/node_modules/**/*