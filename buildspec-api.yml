version: 0.2

env:
  variables:
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
    DOTNET_CLI_TELEMETRY_OPTOUT: "true"

phases:
  install:
    runtime-versions:
      dotnet: 10.0

  pre_build:
    commands:
      - echo "Restoring NuGet packages..."
      - cd API
      - dotnet restore Taskverse.sln

  build:
    commands:
      - echo "Building Taskverse solution..."
      - dotnet build Taskverse.sln --configuration Release --no-restore

  post_build:
    commands:
      - echo "Publishing services..."

      - mkdir -p output

      - dotnet publish Taskverse.API/Taskverse.API.csproj -c Release --no-build -o output/Taskverse.API


      - dotnet publish Taskverse.API.Assessments.Service/Taskverse.API.Assessments.Service.csproj -c Release --no-build -o output/Assessments

      - dotnet publish Taskverse.API.Proctor.Service/Taskverse.API.Proctor.Service.csproj -c Release --no-build -o output/Proctor

      - dotnet publish Taskverse.API.Reports.Service/Taskverse.API.Reports.Service.csproj -c Release --no-build -o output/Reports

      - dotnet publish Taskverse.API.CodingEngine.Service/Taskverse.API.CodingEngine.Service.csproj -c Release --no-build -o output/CodingEngine


      - dotnet publish Taskverse.Auth.Service/Taskverse.API.Auth.Service.csproj -c Release --no-build -o output/Auth

      - dotnet publish Taskverse.College.Service/Taskverse.API.College.Service.csproj -c Release --no-build -o output/College

artifacts:
  base-directory: API/output
  files:
    - '**/*'