<div class="password-change-page">
  <section class="password-change-card mat-elevation-z4">
    <p class="page-eyebrow">First Sign-In</p>
    <h1>Change your temporary password</h1>
    <p class="page-copy">
      Your account needs a permanent password before you can access the rest of Taskverse.
    </p>

    <div *ngIf="errorMessage" class="page-state page-state-error">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="currentPassword">Temporary Password</label>
      <input id="currentPassword" type="password" formControlName="currentPassword" autocomplete="current-password" />

      <label for="newPassword">New Password</label>
      <input id="newPassword" type="password" formControlName="newPassword" autocomplete="new-password" />

      <label for="confirmPassword">Confirm New Password</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" />

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Updating Password...' : 'Change Password' }}
      </button>
    </form>
  </section>
</div>
