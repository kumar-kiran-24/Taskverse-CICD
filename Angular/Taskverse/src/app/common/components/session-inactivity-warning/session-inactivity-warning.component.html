<div
  *ngIf="sessionActivityService.isWarningVisible$ | async"
  class="session-warning-backdrop">
  <section class="session-warning-dialog" (click)="$event.stopPropagation()">
    <div class="session-warning-icon">
      <mat-icon>schedule</mat-icon>
    </div>
    <h3>Still there?</h3>
    <p>Your session will end after 30 minutes of inactivity.</p>
    <p class="session-warning-copy">Interact with the website now to stay signed in.</p>
    <div class="session-warning-actions">
      <button type="button" class="session-warning-button session-warning-button-muted" (click)="sessionActivityService.logoutNow()">
        Logout
      </button>
      <button type="button" class="session-warning-button session-warning-button-primary" (click)="sessionActivityService.continueSession()">
        Continue Session
      </button>
    </div>
  </section>
</div>
