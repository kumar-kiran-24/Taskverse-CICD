version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 10.0

  build:
    commands:
      - echo "Publishing College Service..."
      - dotnet publish API/Taskverse.College.Service/Taskverse.API.College.Service.csproj -c Release -o publish

artifacts:
  files:
    - '**/*'
  base-directory: publish
  secondary-artifacts:
    deployment:
      files:
        - appspec.yml
        - scripts/**/*
        - taskverse-college.service
        - publish/**/*