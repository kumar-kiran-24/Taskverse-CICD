version: 0.0

os: linux

files:
  - source: publish/
    destination: /opt/taskverse/auth

  - source: taskverse-auth.service
    destination: /etc/systemd/system

hooks:
  BeforeInstall:
    - location: scripts/before_install_auth.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install_auth.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start_auth.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/validate_service_auth.sh
      timeout: 300
      runas: root